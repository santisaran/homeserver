services:
  esphome:
    container_name: esphome
    image: esphome/esphome
    volumes:
      - ./conf:/config
      - /etc/localtime:/etc/localtime:ro
    restart: always
    privileged: true
    network_mode: host
    environment:
      - USERNAME=${ESPHOME_USER:-admin}
      - PASSWORD=${ESPHOME_PASSWORD:-CAMBIAR_PASSWORD}
