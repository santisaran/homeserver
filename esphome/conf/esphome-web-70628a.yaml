substitutions:
  name: esphome-web-70628a
  friendly_name: TechoCasa

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2024.6.0
  name_add_mac_suffix: false
  project:
    name: esphome.web
    version: dev

esp8266:
  board: esp01_1m

# Cable amarillo s
one_wire:
  - platform: gpio
    pin: GPIO14 #D5



uart:
  tx_pin: GPIO15  # cable rojo    D8
  rx_pin: GPIO13  # cable blanco  D7
  baud_rate: 9600

sensor:
  - platform: dallas_temp
    name: temp_termotanque
    id: temp_termotanque
    address: 0x793ce1d4437a6128
    update_interval: 60s

  - platform: dallas_temp
    name: temp_techo
    id: temp_techo
    address: 0xc53ce1d443216228
    update_interval: 60s
    
  - platform: "jsn_sr04t"
    id: nivel_agua_tanque_850
    name: "water_distance"
    update_interval: 2s
    filters:
      # 1. Filtro Lambda para descartar lecturas fuera de rango (0.2m a 1.3m)
      # Si el valor es errático, retorna NAN y los siguientes filtros lo ignorarán
      - lambda: |-
          if (x < 0.20 || x > 1.30) return NAN;
          return x;
      - filter_out: nan
      
      # 2. Mediana de 15 muestras: Ideal para el ruido de llenado que viste en el CSV
      - median:
          window_size: 15
          send_every: 5
          
      # 3. Promedio móvil para suavizar el movimiento del agua
      - sliding_window_moving_average:
          window_size: 10
          send_every: 1

  - platform: template
    name: "Litros de agua"
    id: litros_agua
    unit_of_measurement: "L"
    accuracy_decimals: 1
    # Se actualiza automáticamente cuando el sensor de distancia publica
    lambda: |-
      float distancia = id(nivel_agua_tanque_850).state;
      
      if (std::isnan(distancia)) return NAN;

      // Altura total del tanque (desde el sensor hasta el fondo)
      const float ALTURA_MAX = 1.25; 
      
      // Calculamos cuánta agua hay (altura real)
      float altura_agua = ALTURA_MAX - distancia;

      // Limites lógicos
      if (altura_agua < 0) altura_agua = 0;
      
      // Cálculo de litros: Área base (0.95033 m2) * altura * 1000
      float resultado = (0.95033 * altura_agua) * 1000;

      // Si el flotador corta antes, el sensor nunca llegará a 850L reales de agua, 
      // pero esto asegura que no marque de más por error.
      if (resultado > 850) resultado = 850;

      return resultado;


# Enable logging
logger:
# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

# Allow provisioning Wi-Fi via serial
improv_serial:

wifi:
  # Set up a wifi access point
  ap: {}

# In combination with the `ap` this allows the user
# to provision wifi credentials to the device via WiFi AP.
captive_portal:

dashboard_import:
  package_import_url: github://esphome/example-configs/esphome-web/esp8266.yaml@main
  import_full_config: true

# To have a "next url" for improv serial
web_server:
