## Entradas para controlar las salidas con diferentes clics
binary_sensor:
  - platform: gpio
    pin:
      number: 4
      mode:
        input: true
        pullup: true
    name: "Interruptor Luz 1"
    on_press:
      - switch.toggle: luz_1
    on_double_click:
      - switch.turn_on: luz_1
      - delay: 300s # 5 minutos = 300 segundos
      - switch.turn_off: luz_1
  - platform: gpio
    pin:
      number: 5
      mode:
        input: true
        pullup: true
    name: "Interruptor Luz 2"
    on_press:
      - switch.toggle: luz_4
    on_double_click:
      - switch.turn_on: luz_4
      - delay: 300s # 5 minutos = 300 segundos
      - switch.turn_off: luz_4
  - platform: gpio
    pin:
      number: 6
      mode:
        input: true
        pullup: true
    name: "Interruptor Luz 3"
    on_press:
      - switch.toggle: luz_3
    on_double_click:
      - switch.turn_on: luz_3
      - delay: 300s # 5 minutos = 300 segundos
      - switch.turn_off: luz_3

  - platform: gpio
    pin:
      number: 18
      mode: 
        input: true
        pullup: true
    name: "sw18"


  - platform: gpio
    pin:
      number: 19
      mode: 
        input: true
        pullup: true
    name: "sw19"
  
  
# Salidas para las luces
switch:
  - platform: gpio
    pin: 0
    name: "Luz 1"
    id: luz_1
  - platform: gpio
    pin: 1
    name: "Luz 2"
    id: luz_2
  - platform: gpio
    pin: 10
    name: "Luz 3"
    id: luz_3
  - platform: gpio
    pin: 2
    name: "Patio 00"
    id: luz_4
  - platform: gpio
    pin: 3
    name: "Calle 01"
    id: luz_5
  - platform: gpio
    pin: 8
    name: "Calle 00"
    id: luz_6