## Entradas para controlar las salidas con diferentes clics
script:
  - id: toggle_luces_123
    then:
      - if:
          condition:
            or:
              - switch.is_on: luz_1
              - switch.is_on: luz_2
              - switch.is_on: luz_3
          then:
            # Si alguna está prendida, apagar todo
            - switch.turn_off: luz_1
            - switch.turn_off: luz_2
            - switch.turn_off: luz_3
          else:
            # Si todas están apagadas, prender todo
            - switch.turn_on: luz_1
            - switch.turn_on: luz_2
            - switch.turn_on: luz_3

binary_sensor:
  - platform: gpio
    pin:
      number: 4
      mode:
        input: true
        pullup: true
    name: "Interruptor Luz 1"
    filters:
      - delayed_on: 50ms      # debounce: ignora pulsos menores a 50ms
    on_press:
      - switch.toggle: luz_1
    on_double_click:
      min_length: 50ms
      max_length: 350ms
      then:
        - script.execute: toggle_luces_123

  - platform: gpio
    pin:
      number: 5
      mode:
        input: true
        pullup: true
    name: "Interruptor Luz 2"
    filters:
      - delayed_on: 50ms
    on_press:
      - switch.toggle: luz_4
    on_double_click:
      min_length: 50ms
      max_length: 350ms
      then:
        - switch.turn_on: luz_1
        - switch.turn_on: luz_2
        - switch.turn_on: luz_3

  - platform: gpio
    pin:
      number: 6
      mode:
        input: true
        pullup: true
    name: "Interruptor Luz 3"
    filters:
      - delayed_on: 50ms
    on_press:
      - switch.toggle: luz_3
    on_double_click:
      min_length: 50ms
      max_length: 350ms
      then:
        - switch.turn_on: luz_1
        - switch.turn_on: luz_2
        - switch.turn_on: luz_3
  
# Salidas para las luces
switch:
  - platform: gpio
    pin: 0
    name: "Luz 1"
    id: luz_1
  - platform: gpio
    pin: 1
    name: "Luz 2"
    id: luz_2
  - platform: gpio
    pin: 10
    name: "Luz 3"
    id: luz_3
  - platform: gpio
    pin: 2
    name: "Patio 00"
    id: luz_4
  - platform: gpio
    pin: 3
    name: "Calle 01"
    id: luz_5
  - platform: gpio
    pin: 8
    name: "Calle 00"
    id: luz_6