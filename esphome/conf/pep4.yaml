esphome:
  name: latas01
  friendly_name: latas01

esp32:
  board: lolin_c3_mini
  framework:
    type: esp-idf

# Enable logging
logger:

one_wire:
  - platform: gpio
    pin: GPIO10 

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Pep4 Fallback Hotspot"
    password: !secret wifi_ap_password

sensor:
  - platform: dallas_temp
    accuracy_decimals: 1
    address: 0xda0000038e4f2428 
    name: salida
    update_interval: 10s

  - platform: dallas_temp
    accuracy_decimals: 1
    address: 0x163ce1d44367da28
    name: entrada
    update_interval: 10s

captive_portal:
    
web_server:
  