# ─── Servicios internos ───────────────────────────────────────────────────────
# Estos servicios solo deberían ser accesibles desde la red local o VPN.
# Si tu router no hace NAT reflection, usa directamente la IP local.
# Ajusta la red en allow/deny según tu setup (ej: 192.168.0.0/24).

# ─── Transmission ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name torrent.terispi.duckdns.org;

    include /etc/nginx/conf.d/snippets/ssl.conf;

    # Solo acceso desde LAN o WireGuard
    allow 192.168.1.0/24;
    deny all;

    location / {
        proxy_pass http://host.docker.internal:9091;
        include /etc/nginx/conf.d/snippets/proxy_headers.conf;
    }
}

