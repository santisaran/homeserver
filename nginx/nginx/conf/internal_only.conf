# ─── Servicios internos ───────────────────────────────────────────────────────
# Estos servicios solo deberían ser accesibles desde la red local o VPN.
# Si tu router no hace NAT reflection, usa directamente la IP local.
# Ajusta la red en allow/deny según tu setup (ej: 192.168.0.0/24).

# ─── Syncthing ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name syncthing.terispi.duckdns.org;

    include /etc/nginx/conf.d/snippets/ssl.conf;

    allow 192.168.1.0/24;
    allow 10.8.0.0/28;
    deny all;

    location / {
        proxy_pass http://host.docker.internal:8384;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;  # Necesario para evitar el bloqueo CSRF de Syncthing
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Transmission ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name torrent.terispi.duckdns.org;

    include /etc/nginx/conf.d/snippets/ssl.conf;

    # Solo acceso desde LAN o WireGuard
    allow 192.168.1.0/24;
    allow 10.8.0.0/28;
    deny all;

    location / {
        proxy_pass http://host.docker.internal:9091;
        include /etc/nginx/conf.d/snippets/proxy_headers.conf;
    }
}

