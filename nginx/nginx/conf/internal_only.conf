# ─── Biblioteca interna ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name biblio.terispi.duckdns.org;

    include /etc/nginx/conf.d/snippets/ssl.conf;

    allow 192.168.1.0/24;
    allow 10.8.0.0/28;
    deny all;

    location = / {
        return 302 /biblio/;
    }

    location = /biblio {
        return 301 /biblio/;
    }

    location /biblio/ {
        alias /var/www/biblio/indice-web/;
        index index.html;
        try_files $uri $uri/ /biblio/index.html;
    }

    location /biblioteca/ {
        alias /var/www/biblio/biblioteca/;
        autoindex off;
    }
}

