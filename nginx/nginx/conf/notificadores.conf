# ─── Notificadores: WebSocket + Webhook de Telegram ────────────────────────
server {
    listen 443 ssl;
    server_name notif.terispi.duckdns.org;

    include /etc/nginx/conf.d/snippets/ssl.conf;

    # WebSocket (clientes conectados en tiempo real)
    location / {
        allow 192.168.1.0/24;
        allow 10.8.0.0/24;
        deny all;

        proxy_pass http://host.docker.internal:8765;
        include /etc/nginx/conf.d/snippets/proxy_headers.conf;
    }

    # Cliente web local (solo LAN/VPN)
    location = /client {
        allow 192.168.1.0/24;
        allow 10.8.0.0/24;
        deny all;

        proxy_pass http://host.docker.internal:8766/client;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook de Telegram (POST desde los servidores de Telegram)
    location /webhook {
        proxy_pass http://host.docker.internal:8766/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Reenviar el header de autenticación de Telegram
        proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
    }
}
