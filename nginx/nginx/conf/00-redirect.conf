server {
    listen 80;
    server_name 192.168.1.118;

    allow 192.168.1.0/24;
    deny all;

    location = / {
        return 302 /biblio/;
    }

    location = /biblio {
        return 301 /biblio/;
    }

    location /biblio/ {
        alias /var/www/biblio/indice-web/;
        index index.html;
        try_files $uri $uri/ /biblio/index.html;
    }

    # Archivos de biblioteca: se sirven directamente por HTTP (sin redirigir a HTTPS)
    location /biblioteca/ {
        alias /var/www/biblio/biblioteca/;
        autoindex off;
    }
}

# HTTP → HTTPS redirect global
server {
    listen 80;
    server_name _;

    # Ruta para renovación de certificados Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # CA cert local — descargable desde cualquier dispositivo de la red
    # http://192.168.1.118/ca.crt
    location = /ca.crt {
        root /var/www/certbot;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="homeserver-local-ca.crt"';
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
