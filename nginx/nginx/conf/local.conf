# ─── Dominios .local (resueltos por AdGuard → 192.168.1.118) ──────────────────
# AdGuard DNS rewrites:
#   immich.local  → 192.168.1.118
#   hass.local    → 192.168.1.118
#   paper.local   → 192.168.1.118
#   esphome.local → 192.168.1.118
# ──────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect para todos los dominios .local
server {
    listen 80;
    server_name immich.local hass.local paper.local esphome.local;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Immich ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name immich.local;

    include /etc/nginx/conf.d/snippets/ssl-local.conf;

    client_max_body_size 50000M;
    client_body_timeout  1800s;
    proxy_read_timeout   1800s;
    proxy_send_timeout   1800s;

    location / {
        proxy_pass http://host.docker.internal:2283;
        include /etc/nginx/conf.d/snippets/proxy_headers.conf;
    }
}

# ─── Home Assistant ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name hass.local;

    include /etc/nginx/conf.d/snippets/ssl-local.conf;

    location / {
        proxy_pass http://host.docker.internal:8123;
        include /etc/nginx/conf.d/snippets/proxy_headers.conf;
    }
}

# ─── Paperless-ngx ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name paper.local;

    include /etc/nginx/conf.d/snippets/ssl-local.conf;

    client_max_body_size 100M;

    location / {
        proxy_pass http://host.docker.internal:8000;
        include /etc/nginx/conf.d/snippets/proxy_headers.conf;
    }
}

# ─── ESPHome ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name esphome.local;

    include /etc/nginx/conf.d/snippets/ssl-local.conf;

    location / {
        proxy_pass http://host.docker.internal:6052;
        include /etc/nginx/conf.d/snippets/proxy_headers.conf;
    }
}
