# ─── Flame (dashboard) ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name dash.terispi.duckdns.org;

    include /etc/nginx/conf.d/snippets/ssl.conf;

    location / {
        proxy_pass http://host.docker.internal:5005;
        include /etc/nginx/conf.d/snippets/proxy_headers.conf;
    }
}

# ─── Dockge (gestión de stacks) ──────────────────────────────────────────────
# ADVERTENCIA: Exponer solo desde red local o VPN.
# Descomentar allow/deny si se quiere restringir por IP.
server {
    listen 443 ssl;
    server_name mgmt.terispi.duckdns.org;

    include /etc/nginx/conf.d/snippets/ssl.conf;

    # Restringir a red local (descomenta y ajusta según tu red)
    allow 192.168.1.0/24;
    deny all;

    location / {
        proxy_pass http://host.docker.internal:5001;
        include /etc/nginx/conf.d/snippets/proxy_headers.conf;
    }
}

# ─── Music Assistant ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name music.terispi.duckdns.org;

    include /etc/nginx/conf.d/snippets/ssl.conf;
    # Restringir a red local (descomenta y ajusta según tu red)
    allow 192.168.1.0/24;
    deny all;

    location / {
        proxy_pass http://host.docker.internal:8095;
        include /etc/nginx/conf.d/snippets/proxy_headers.conf;
    }
}
