services:
  dockge:
    image: louislam/dockge:1
    container_name: dockge
    restart: unless-stopped
    ports:
      - 5001:5001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      # El directorio donde viven todos tus stacks
      - ${STACKS_DIR:-/home/santiagopaleka/dockers}:/opt/stacks
    environment:
      - DOCKGE_STACKS_DIR=/opt/stacks
      - DOCKGE_ENABLE_CONSOLE=true
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
