services:
  wg-easy:
    image:  ghcr.io/wg-easy/wg-easy
    container_name: wg-easy
    environment:
      # Tu dominio de DuckDNS
      - WG_HOST=wg.terispi.duckdns.org
      
      # Password para acceder a la interfaz web
      - PASSWORD_HASH=${PASSWORD_HASH}

        # DNS que usarán los clientes (opcional)
      - WG_DEFAULT_DNS=1.1.1.1,1.0.0.1
      
      # Permitir acceso a la red local (importante para Transmission)
      - WG_ALLOWED_IPS=192.168.1.0/24
      
      # Puerto de Wireguard (puedes cambiarlo)
      - WG_PORT=51820
      
    volumes:
      - ./data:/etc/wireguard
    
    ports:
      - "51820:51820/udp"  # Puerto VPN
      - "51821:51821/tcp"  # Interfaz web (cambia si quieres)
    
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    
    restart: unless-stopped