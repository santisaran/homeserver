services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    environment:
      - UMASK=007
    volumes:
      - ./homeassistant:/config
      - ./homeassistant/casita-1733-f98989bde6ca.json:/config/google_key.json:ro
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/saran/notificadores:/config/scripts
      - /home/saran/hass_media:/media
      - /run/dbus:/run/dbus:ro
        #      - /var/run/dbus:/var/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      
