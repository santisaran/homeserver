services:
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=007
    volumes:
      - ./homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    privileged: true
    network_mode: host

  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: ghcr.io/koenkk/zigbee2mqtt
    restart: unless-stopped
    group_add:
      - dialout
    user: 1000:1000
    volumes:
      - ./zigbee2mqtt:/app/data
      - /run/udev:/run/udev:ro
        #   ports:
        #      - 8080:8080
    environment:
      - TZ=America/Argentina/Buenos_Aires
    devices:
      - /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0:/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
    network_mode: host
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    user: "1000:1000"
    environment:
      - UID=1000
      - GID=1000
    ports:
      - "1883:1883"  # MQTT port
      - "9001:9001"  # WebSockets port
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  nodered:
    container_name: nodered
    image: nodered/node-red:latest
    volumes:
      - ./nodered:/data
    ports:
      - "1880:1880"
    restart: unless-stopped
    environment:
      - TZ=America/Argentina/Buenos_Aires
    # Agrega aquí tu STM32 cuando lo conectes:
    # devices:
    #   - /dev/serial/by-id/usb-STM32_Virtual_ComPort-if00:/dev/ttyUSB1
    depends_on:
      - mosquitto
    user: "1000:1000"
    group_add:
      - dialout  # Para acceso a puertos serie

  otbr:
    container_name: otbr
    image: openthread/border-router:latest
    hostname: otbr
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - OT_RCP_DEVICE=spinel+hdlc+uart:///dev/ttyUSB1?uart-baudrate=460800
      - OT_INFRA_IF=enp2s0
      - OT_THREAD_IF=wpan0
      - OT_LOG_LEVEL=7
    network_mode: host
    privileged: true
    volumes:
      - ./otbr:/data
    devices:
      #      - source: /dev/serial/by-id/usb-Prolific_Technology_Inc._USB-Serial_Controller-if00-port0
      #  target: /dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1
      - /dev/net/tun:/dev/net/tun
    restart: always

