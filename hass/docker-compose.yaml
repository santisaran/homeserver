  nodered:
    container_name: nodered
    image: nodered/node-red:latest
    volumes:
      - ./nodered:/data
    ports:
      - 1880:1880
    restart: unless-stopped
    environment:
      - TZ=America/Argentina/Buenos_Aires
    # Agrega aquí tu STM32 cuando lo conectes:
    # devices:
    #   - /dev/serial/by-id/usb-STM32_Virtual_ComPort-if00:/dev/ttyUSB1
#    depends_on:
#      - mosquitto
    user: 1000:1000
    group_add:
      - dialout # Para acceso a puertos serie

  frigate:
    container_name: frigate
    privileged: true
    restart: unless-stopped
    image: ghcr.io/blakeblackshear/frigate:stable
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./frigate:/config
      - /path/to/your/storage:/media/frigate
    ports:
      - "5000:5000"
      - "8554:8554" # RTSP feeds
    environment:
      FRIGATE_RTSP_PASSWORD: ${FRIGATE_PASS:-CAMBIAR_PASSWORD}


