services:
  notificadores-mqtt:
    build: .
    container_name: notificadores_worker
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8765:8765"
      - "8766:8766"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - PYTHONUNBUFFERED=1
      - WS_HOST=0.0.0.0
      - WS_PORT=8765
      - WEBHOOK_HOST=0.0.0.0
      - WEBHOOK_PORT=8766
      # WEBHOOK_URL=https://notif.terispi.duckdns.org/webhook
      # WEBHOOK_SECRET=tu_token_secreto_aqui
    networks:
      - default
      - proxy_net

networks:
  proxy_net:
    external: true
